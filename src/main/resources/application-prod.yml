spring:
  config:
    import: aws-parameterstore:/member-service/prod/

  datasource:
    url: ${db-url}
    username: ${db-username}
    password: ${db-password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

cloud:
  aws:
    region:
      static: ${AWS_REGION:ap-northeast-2}

    s3:
      bucket: ${s3-bucket-name}

management:
  endpoint:
    health:
      show-details: never

  info:
    env:
      enabled: true
