name: Java CI/CD with Docker

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 저장소 코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v5

      # 2. Java 17 설치 + Gradle 캐시
      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: gradle

      # 3. gradlew 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. JAR 빌드
      - name: Build JAR
        run: ./gradlew bootJar

      # 6. Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 7. Docker 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/member-service:latest

      # 8. EC2에 SSH 접속해서 최신 이미지로 재배포
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ vars.DOCKERHUB_USERNAME }}/member-service:latest

            docker stop member-service-container || true
            docker rm member-service-container || true

            docker run -d \
              --name member-service-container \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              ${{ vars.DOCKERHUB_USERNAME }}/member-service:latest